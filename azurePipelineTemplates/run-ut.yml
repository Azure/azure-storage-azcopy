parameters:
  - name: directories
    type: object
    default: []
  - name: isMutexSet
    type: string
  - name: fips
    type: string
    default: ''
  - name: display_name
    type: string
  - name: with_federated_credential
    type: boolean
    default: false
steps:
- ${{ each directory in parameters.directories }}:
  - bash: |
      # Replace all forward slashes with periods, to avoid creating directories.
      # This is done in two assignments because template expression syntax doesn't seem to work within shell parameter expansion.
      baseReportName="${{ directory }}"
      baseReportName="${baseReportName//[\/]/.}"
      # It's unclear what the effect of setting CGO_ENABLED to an empty string would be,
      # so this variable will store the name and value, to prevent running commands with "CGO_ENABLED=", later. 
      cgoEnabled=''
      # This sets the GOFIPS environment variable, which is only used by Microsoft builds of Go.
      # Setting it to the empty string simplifies the pipeline logic and has no effect on the product.
      # See https://github.com/microsoft/go/blob/microsoft/main/eng/doc/fips/README.md#usage-runtime
      gofips=''
      if [[ '${{ parameters.fips }}' == 'enabled' ]]; then
        baseReportName="${baseReportName}-fips-enabled"
        cgoEnabled='CGO_ENABLED=1'
        gofips=1
      elif [[ '${{ parameters.fips }}' == 'disabled' ]]; then
        baseReportName="${baseReportName}-fips-disabled"
        # We'll be testing with FIPS disabled, but the CGO_ENABLED variable should still be set to 1 when testing the FIPS build,
        # to ensure we test the crypto backend that decides at runtime whether to use a FIPS-compliant implementation or not.
        cgoEnabled='CGO_ENABLED=1'
        # WARNING: GOFIPS=0 won't disable FIPS in version 1.27+ of the Microsoft build of Go.
        # See https://github.com/microsoft/go/blob/microsoft/main/eng/doc/fips/README.md#usage-runtime
        gofips=0
      fi
      echo "##vso[task.setvariable variable=baseCoverageReportName]${baseReportName}_coverage"
      echo "##vso[task.setvariable variable=junitReportName]${baseReportName}_report.xml" 
      echo "##vso[task.setvariable variable=cgoEnabled]$cgoEnabled"
      echo "##vso[task.setvariable variable=gofips]$gofips"
    displayName: 'Set Job Variables'
    # Later steps that run on failure use variables set in this step.
    # Don't run if job is canceled or mutex wasn't acquired (in which case, test task won't run, and no test results or coverage data to report)
    condition: and(succeededOrFailed(), eq(${{ parameters.isMutexSet }}, 'true'))

  - ${{ if eq(false, parameters.with_federated_credential) }}:
    - script: |
        # This should be identical to the inlineScript below. Once you've updated one script, just copy, paste, and indent it in the other location.
        set -e

        # Generate the name of the file the test results will be written to
        testResultsFileName="test.txt"

        # Run tests, write coverage data to a file, and pipe output to a file
        echo "Running tests in ${{ directory }}. Writing coverage data to $(baseCoverageReportName).txt and test results to ${testResultsFileName}."
        $(cgoEnabled) go test -timeout=1h -v -coverprofile="$(baseCoverageReportName).txt" "./${{ directory }}" | tee "$testResultsFileName"
        
        exit_code=${PIPESTATUS[0]}

        # Generate the jUnit report
        echo "Generating jUnit report $(junitReportName) for ${{ directory }}"
        cat "$testResultsFileName" | $(go env GOPATH)/bin/go-junit-report > "$(junitReportName)"

        # Convert coverage data to JSON format
        echo "Generating JSON coverage report $(baseCoverageReportName).json for ${{ directory }}"
        $(go env GOPATH)/bin/gocov convert "$(baseCoverageReportName).txt" > "$(baseCoverageReportName).json"

        # Convert coverage data to XML format
        echo "Generating XML coverage report $(baseCoverageReportName).xml for ${{ directory }}"
        $(go env GOPATH)/bin/gocov-xml < "$(baseCoverageReportName).json" > "$(baseCoverageReportName).xml"
        
        exit "$exit_code"
      env:
        GOFIPS: $(gofips)
        ACCOUNT_NAME: $(ACCOUNT_NAME)
        ACCOUNT_KEY: $(ACCOUNT_KEY)
        AZCOPY_E2E_ACCOUNT_KEY: $(AZCOPY_E2E_ACCOUNT_KEY)
        AZCOPY_E2E_ACCOUNT_NAME: $(AZCOPY_E2E_ACCOUNT_NAME)
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        GOOGLE_APPLICATION_CREDENTIALS: $(ciGCSServiceAccountKey.secureFilePath)
        GOOGLE_CLOUD_PROJECT: $(GOOGLE_CLOUD_PROJECT)
        # All env variables above this comment should be the same for both scripts.
        AZCOPY_E2E_APPLICATION_ID: $(ACTIVE_DIRECTORY_APPLICATION_ID)
        AZCOPY_E2E_CLIENT_SECRET: $(AZCOPY_SPA_CLIENT_SECRET)
        AZCOPY_E2E_TENANT_ID: $(OAUTH_TENANT_ID)
      displayName: 'Run ${{ directory }} tests'
      # Don't let a test failure for a different directory prevent this directory from being tested,
      # but don't run if job is canceled or mutex wasn't acquired
      condition: and(succeededOrFailed(), eq(${{ parameters.isMutexSet }}, 'true'))
  - ${{ else }}:
    - task: AzureCLI@2
      inputs:
        azureSubscription: azcopytestworkloadidentity
        addSpnToEnvironment: true
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # This should be identical to the script above. Once you've updated one script, just copy, paste, and indent it in the other location.
          set -e

          # Generate the name of the file the test results will be written to
          testResultsFileName="test.txt"

          # Run tests, write coverage data to a file, and pipe output to a file
          echo "Running tests in ${{ directory }}. Writing coverage data to $(baseCoverageReportName).txt and test results to ${testResultsFileName}."
          $(cgoEnabled) go test -timeout=1h -v -coverprofile="$(baseCoverageReportName).txt" "./${{ directory }}" | tee "$testResultsFileName"
          
          exit_code=${PIPESTATUS[0]}

          # Generate the jUnit report
          echo "Generating jUnit report $(junitReportName) for ${{ directory }}"
          cat "$testResultsFileName" | $(go env GOPATH)/bin/go-junit-report > "$(junitReportName)"

          # Convert coverage data to JSON format
          echo "Generating JSON coverage report $(baseCoverageReportName).json for ${{ directory }}"
          $(go env GOPATH)/bin/gocov convert "$(baseCoverageReportName).txt" > "$(baseCoverageReportName).json"

          # Convert coverage data to XML format
          echo "Generating XML coverage report $(baseCoverageReportName).xml for ${{ directory }}"
          $(go env GOPATH)/bin/gocov-xml < "$(baseCoverageReportName).json" > "$(baseCoverageReportName).xml"
          
          exit "$exit_code"
      env:
        GOFIPS: $(gofips)
        ACCOUNT_NAME: $(ACCOUNT_NAME)
        ACCOUNT_KEY: $(ACCOUNT_KEY)
        AZCOPY_E2E_ACCOUNT_KEY: $(AZCOPY_E2E_ACCOUNT_KEY)
        AZCOPY_E2E_ACCOUNT_NAME: $(AZCOPY_E2E_ACCOUNT_NAME)
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        GOOGLE_APPLICATION_CREDENTIALS: $(ciGCSServiceAccountKey.secureFilePath)
        GOOGLE_CLOUD_PROJECT: $(GOOGLE_CLOUD_PROJECT)
        # All env variables above this comment should be the same for both scripts.
        NEW_E2E_ENVIRONMENT: 'AzurePipeline'
      displayName: 'Run ${{ directory }} tests with Workload Identity'
      # Don't let a test failure for a different directory prevent this directory from being tested,
      # but don't run if job is canceled or mutex wasn't acquired
      condition: and(succeededOrFailed(), eq(${{ parameters.isMutexSet }}, 'true'))

  - task: PublishTestResults@2
    inputs:
      testRunner: JUnit
      testResultsFiles: '$(System.DefaultWorkingDirectory)/**/$(junitReportName)'
      testRunTitle: 'Unit Tests: ${{ parameters.display_name }} - ${{ directory }}'
      # Don't run if job is canceled or mutex wasn't acquired (in which case, test task didn't run, so no test results to report)
    condition: and(succeededOrFailed(), eq(${{ parameters.isMutexSet }}, 'true'))

  - task: PublishCodeCoverageResults@1
    inputs:
      codeCoverageTool: Cobertura
      summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/$(baseCoverageReportName).xml'
      # Don't run if job is canceled or mutex wasn't acquired (in which case, test task didn't run, so no test coverage data to report)
    condition: and(succeededOrFailed(), eq(${{ parameters.isMutexSet }}, 'true'))