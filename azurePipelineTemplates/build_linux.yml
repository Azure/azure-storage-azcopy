parameters:
  host_architecture: ''
  host_suffix: ''
  build_suffix: ''
  package_suffix: ''
  package_description_suffix: ''
  package_conflicts: ''

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - task: GoTool@0
    env:
      GO111MODULE: 'on'
    inputs:
      version: $(AZCOPY_GOLANG_VERSION)
      ${{ if eq(parameters.build_suffix, '_fips') }}:
        # We use the Microsoft build of Go to produce FIPS-capable Linux builds.
        goDownloadUrl: 'https://aka.ms/golang/release/latest'
    ${{ if eq(parameters.build_suffix, '_fips') }}:
      displayName: 'Install Microsoft build of Go'
    ${{ else }}:
      displayName: 'Install Go'

  # install dependencies required for compiling azcopy
  - script: |
      sudo apt-get clean
      sudo apt-get update --fix-missing
      sudo apt-get install pkg-config libsecret-1-dev ruby ruby-dev rubygems libglib2.0-dev build-essential rpm -y
      sudo gem install dotenv -v 2.8.1
      sudo gem install fpm -V
    displayName: 'Install Dependencies'

  - script: |
      mkdir -p $(binaries)
      mkdir -p $(unsigned)
    displayName: 'Create output paths'

  - script: |
      go build -tags "netgo" -o "$(binaries)/azcopy_linux${{ parameters.build_suffix }}_${{ parameters.host_architecture }}"
    displayName: 'Build'
    env:
      GOARCH: '${{ parameters.host_architecture }}'
      GOOS: linux
      ${{ if eq(parameters.build_suffix, '_fips') }}:
        CGO_ENABLED: 1

  - script: |
      go build -tags "netgo,se_integration" -o "$(binaries)/azcopy_linux_se${{ parameters.build_suffix }}_${{ parameters.host_architecture }}"
    displayName: 'Build SE Integration'
    env:
      GOARCH: '${{ parameters.host_architecture }}'
      GOOS: linux
      ${{ if eq(parameters.build_suffix, '_fips') }}:
        CGO_ENABLED: 1

  - script: |
      linux_dir="$(System.DefaultWorkingDirectory)/azcopy_linux${{ parameters.build_suffix }}_${{ parameters.host_architecture }}_$(azcopy_version)"
      echo "##vso[task.setvariable variable=linux_dir]$linux_dir"
      
      linux_se_dir="$(System.DefaultWorkingDirectory)/azcopy_linux_se${{ parameters.build_suffix }}_${{ parameters.host_architecture }}_$(azcopy_version)"
      echo "##vso[task.setvariable variable=linux_se_dir]$linux_se_dir"
      
      mkdir -p $linux_dir
      mkdir -p $linux_se_dir
      mkdir -p $(archives)
      mkdir -p pkgDir/usr/bin/
    displayName: 'Create archive directories'

  - script: |
      cp $(binaries)/azcopy_linux${{ parameters.build_suffix }}_${{ parameters.host_architecture }} $(linux_dir)/azcopy
      cp NOTICE.txt $(linux_dir)/
      
      cp $(binaries)/azcopy_linux_se${{ parameters.build_suffix }}_${{ parameters.host_architecture }} $(linux_se_dir)/azcopy
      cp NOTICE.txt $(linux_se_dir)/
      
      cp $(linux_dir)/azcopy pkgDir/usr/bin/
      cp NOTICE.txt pkgDir/usr/bin/
    displayName: 'Copy required files for packaging'

  # using fpm tool for packaging of our binary & performing post-install operations
  # for additional information about fpm refer https://fpm.readthedocs.io/en/v1.13.1/
  - script: |
      conflicts=''
      if [[ -n "${{ parameters.package_conflicts }}" ]]; then
        conflicts="--conflicts ${{ parameters.package_conflicts }}"
      fi

      fpm -s dir -t deb -n azcopy${{ parameters.package_suffix }} -C pkgDir/ \
      -v $(azcopy_version) $conflicts \
      --maintainer "Azcopy v-Team <azcopyvteam@microsoft.com>" \
      --url "https://github.com/Azure/azure-storage-azcopy" \
      --description "A command-line utility that is used to copy data to and from containers and file shares in Azure Storage accounts${{ parameters.package_description_suffix }}"
      mv ./azcopy*.deb $(unsigned)/azcopy${{ parameters.package_suffix }}-$(azcopy_version).${{ parameters.host_suffix }}.deb
    displayName: 'Make deb Package'

  - script: |
      # Some tools (rpm) don't display the conflict data within .rpm files when printing the package information,
      # but testing has shown that the conflict data IS written to the .rpm file.
      # The conflict data alters the messages that are printed during an attempt to install a package that conflicts with an installed package.
      conflicts=''
      if [[ -n "${{ parameters.package_conflicts }}" ]]; then
        conflicts="--conflicts ${{ parameters.package_conflicts }}"
      fi

      fpm -s dir -t rpm -n azcopy${{ parameters.package_suffix }} --rpm-digest sha256 -C pkgDir/ \
      -v $(azcopy_version) $conflicts \
      --maintainer "Azcopy v-Team <azcopyvteam@microsoft.com>" \
      --url "https://github.com/Azure/azure-storage-azcopy" \
      --description "A command-line utility that is used to copy data to and from containers and file shares in Azure Storage accounts${{ parameters.package_description_suffix }}"
      mv ./azcopy*.rpm $(unsigned)/azcopy${{ parameters.package_suffix }}-$(azcopy_version).${{ parameters.host_suffix }}.rpm
    displayName: 'Make rpm Package'

  - task: ArchiveFiles@2
    displayName: 'Archive Linux Build'
    inputs:
      rootFolderOrFile: '$(linux_dir)'
      archiveType: tar
      archiveFile: '$(unsigned)/azcopy_linux${{ parameters.build_suffix }}_${{ parameters.host_architecture }}_$(azcopy_version).tar.gz'

  - task: ArchiveFiles@2
    displayName: 'Archive Partner(SE) Linux Build'
    inputs:
      rootFolderOrFile: '$(linux_se_dir)'
      archiveType: tar
      archiveFile: '$(unsigned)/azcopy_linux_se${{ parameters.build_suffix }}_${{ parameters.host_architecture }}_$(azcopy_version).tar.gz'